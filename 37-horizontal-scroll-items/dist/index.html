<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>CodePen - GSAP Timeline per item issue</title>
  <link rel="stylesheet" href="./style.css">

</head>
<body>
<!-- partial:index.partial.html -->
<div class="timeline" style="width: 150%">
  <div class="timeline-items">
    <div class="timeline-item-container empty"></div>
    <div class="timeline-item-container" id="item-0">
      <div class="timeline-line">
        <div class="line-inner"></div>
      </div>
      <div class="timeline-item-toggle">
        <div class="item-number">
          0 </div>
        <div class="item-title">
          Scroll To See More
        </div>
      </div>
      <div class="timeline-item-content">
        <h2>Scroll To See More</h2>
        <p></p>
        <span class="timeline-date">01/01/1991</span>
      </div>
    </div>
    <div class="timeline-item-container" id="item-1">
      <div class="timeline-line">
        <div class="line-inner"></div>
      </div>
      <div class="timeline-item-toggle">
        <div class="item-number">
          1 </div>
        <div class="item-title">
          1994 </div>
      </div>
      <div class="timeline-item-content">
        <h2>1994</h2>
        <span class="timeline-date">1994-01-01</span>
      </div>
    </div>
    <div class="timeline-item-container" id="item-2">
      <div class="timeline-line">
        <div class="line-inner"></div>
      </div>
      <div class="timeline-item-toggle">
        <div class="item-number">
          2 </div>
        <div class="item-title">
          1996 </div>
      </div>
      <div class="timeline-item-content">
        <h2>1996</h2>
        <span class="timeline-date">1996-01-01</span>
      </div>
    </div>
    <div class="timeline-item-container empty"></div>
  </div>
</div>
<!-- partial -->
  <script src='https://unpkg.com/gsap@3/dist/gsap.min.js'></script>
<script src='https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js'></script>
<script src='https://unpkg.com/gsap@3/dist/ScrollToPlugin.min.js'></script><script  src="./script.js"></script>

</body>
</html>
